apiVersion: v1
kind: ConfigMap
metadata:
  name: avira-app-env
data:
  # Infrastructure is expected to run outside K3s (docker-compose on host).
  # For k3d, replace host.docker.internal with host.k3d.internal if needed.
  KEYCLOAK_SERVER_URL: http://host.docker.internal:8080
  KEYCLOAK_ISSUER_URI: http://host.docker.internal:8080/realms/avira
  KEYCLOAK_REALM: avira
  KEYCLOAK_CLIENT_ID: avira-user-client
  KEYCLOAK_ADMIN_CLIENT_ID: admin-cli

  AVIRA_MESSAGING_ENABLED: "true"
  AVIRA_MESSAGING_PROVIDER: rabbitmq-stream
  AVIRA_MESSAGING_RABBIT_STREAM_HOST: host.docker.internal
  AVIRA_MESSAGING_RABBIT_STREAM_PORT: "5552"
  AVIRA_MESSAGING_RABBIT_STREAM_USERNAME: admin
  AVIRA_MESSAGING_RABBIT_STREAM_VHOST: /
  AVIRA_RABBIT_STREAM_HOST: host.docker.internal
  AVIRA_RABBIT_STREAM_PORT: "5552"
  AVIRA_RABBIT_STREAM_USERNAME: admin
  AVIRA_RABBIT_STREAM_VHOST: /

  # Database URLs – names match init-databases.sh (service-name with underscores)
  DB_USERNAME: postgres
  DB_URL_USER: jdbc:postgresql://host.docker.internal:5455/user_service
  DB_URL_PROJECT: jdbc:postgresql://host.docker.internal:5455/project_service
  DB_URL_ADMINISTRATION: jdbc:postgresql://host.docker.internal:5455/administration_service
  DB_URL_BUSINESS: jdbc:postgresql://host.docker.internal:5455/business_service

  # Endpoint catalog – in-cluster URLs used by administration-service
  # (services are in the same 'avira' namespace, short DNS names resolve)
  CATALOG_AUTH_URL: http://authentication-service:10001/api/v3/api-docs
  CATALOG_USER_URL: http://user-service:10002/api/v3/api-docs
  CATALOG_PROJECT_URL: http://project-service:10004/api/v3/api-docs
  CATALOG_INIT_URL: http://application-initialization-service:10000/api/v3/api-docs
  CATALOG_ADMIN_URL: http://administration-service:10005/api/v3/api-docs

