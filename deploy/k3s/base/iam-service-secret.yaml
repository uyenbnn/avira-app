apiVersion: v1
kind: Secret
metadata:
  name: iam-service-secret
type: Opaque
stringData:
  # Local/dev defaults only. Override all CHANGE_ME values outside local environments.
  KEYCLOAK_ADMIN: CHANGE_ME_KEYCLOAK_ADMIN
  KEYCLOAK_ADMIN_PASSWORD: CHANGE_ME_KEYCLOAK_ADMIN_PASSWORD
  KEYCLOAK_SAAS_CLIENT_SECRET: CHANGE_ME_KEYCLOAK_SAAS_CLIENT_SECRET
  KEYCLOAK_PLATFORM_CLIENT_SECRET: CHANGE_ME_KEYCLOAK_PLATFORM_CLIENT_SECRET
  KEYCLOAK_SAAS_ADMIN_PASSWORD: CHANGE_ME_KEYCLOAK_SAAS_ADMIN_PASSWORD
  KEYCLOAK_SAAS_ADMIN_EMAIL: admin@platform.local

  # Backward compatibility until iam-service fully migrates to KEYCLOAK_PLATFORM_CLIENT_SECRET.
  # Remove once all services no longer read KEYCLOAK_BACKEND_CLIENT_SECRET.
  KEYCLOAK_BACKEND_CLIENT_SECRET: CHANGE_ME_KEYCLOAK_PLATFORM_CLIENT_SECRET
