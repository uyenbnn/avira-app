apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: default
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: iam-service
        url: http://iam-service.avira.svc.cluster.local:10003
        routes:
          - name: iam-service-auth-routes
            paths:
              - /api/iam/auth
            strip_path: false
          - name: iam-service-init-routes
            paths:
              - /api/iam/init
            strip_path: false
          - name: iam-service-realms-routes
            paths:
              - /api/iam/realms
            strip_path: false
          - name: iam-service-users-routes
            paths:
              - /api/iam/users
            strip_path: false
---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: kong
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: admin
      port: 8001
      targetPort: 8001
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: default
  labels:
    app: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
      - name: kong
        image: kong:3.7
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: proxy
        - containerPort: 8001
          name: admin
        env:
        - name: KONG_DATABASE
          value: "off"
        - name: KONG_DECLARATIVE_CONFIG
          value: /etc/kong/kong.yml
        - name: KONG_PROXY_ACCESS_LOG
          value: /dev/stdout
        - name: KONG_ADMIN_ACCESS_LOG
          value: /dev/stdout
        - name: KONG_PROXY_ERROR_LOG
          value: /dev/stderr
        - name: KONG_ADMIN_ERROR_LOG
          value: /dev/stderr
        - name: KONG_ADMIN_LISTEN
          value: "0.0.0.0:8001"
        volumeMounts:
        - name: kong-config
          mountPath: /etc/kong
          readOnly: true
        livenessProbe:
          httpGet:
            path: /status
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /status
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: kong-config
        configMap:
          name: kong-config

