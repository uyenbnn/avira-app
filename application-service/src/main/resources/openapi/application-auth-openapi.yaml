openapi: 3.0.3
info:
  title: Application Service MVP API
  version: 1.0.0
paths:
  /api/apps/{appId}/auth/token-exchange:
    post:
      summary: Exchange subject token for app-scoped token using configured auth strategy
      parameters:
        - in: path
          name: appId
          required: true
          schema:
            type: string
        - in: header
          name: X-Tenant-Id
          required: true
          schema:
            type: string
          description: Tenant claim extracted from validated JWT by gateway/security layer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenExchangeRequest"
      responses:
        "200":
          description: App token exchange result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppTokenResponse"
        "403":
          description: Missing tenant context
components:
  schemas:
    TokenExchangeRequest:
      type: object
      required: [subjectToken, authMode]
      properties:
        subjectToken:
          type: string
        authMode:
          type: string
          enum: [KEYCLOAK, CUSTOM_JWT, PASSTHROUGH]
    AppTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int64
        tokenType:
          type: string
        appId:
          type: string
        tenantId:
          type: string
        strategy:
          type: string
