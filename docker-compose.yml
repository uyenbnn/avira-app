services:

  postgres:
    image: postgres:16
    container_name: avira-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5455:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres:/docker-entrypoint-initdb.d:ro

  rabbitmq:
    image: rabbitmq:latest
    container_name: avira-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # management UI
      - "5552:5552"      # stream protocol
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    command: >
      bash -c "
      rabbitmq-plugins enable --offline rabbitmq_management rabbitmq_stream rabbitmq_stream_management &&
      rabbitmq-server
      "

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: avira-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres

      # Local/dev only: override CHANGE_ME defaults via environment before running outside local testing.
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-CHANGE_ME_KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-CHANGE_ME_KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_SAAS_CLIENT_SECRET: ${KEYCLOAK_SAAS_CLIENT_SECRET:-CHANGE_ME_KEYCLOAK_SAAS_CLIENT_SECRET}
      KEYCLOAK_PLATFORM_CLIENT_SECRET: ${KEYCLOAK_PLATFORM_CLIENT_SECRET:-CHANGE_ME_KEYCLOAK_PLATFORM_CLIENT_SECRET}
      KEYCLOAK_SAAS_ADMIN_PASSWORD: ${KEYCLOAK_SAAS_ADMIN_PASSWORD:-CHANGE_ME_KEYCLOAK_SAAS_ADMIN_PASSWORD}
      KEYCLOAK_SAAS_ADMIN_EMAIL: ${KEYCLOAK_SAAS_ADMIN_EMAIL:-admin@platform.local}
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/keycloak/realm-templates:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200' <&3"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      - postgres

volumes:
  postgres_data:
  rabbitmq_data: